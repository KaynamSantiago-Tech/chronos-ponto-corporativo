name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shared:
    name: shared | build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @midrah/shared build

  web:
    name: web | lint + typecheck + build
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @midrah/shared build
      - run: pnpm --filter @midrah/web lint
      - run: pnpm --filter @midrah/web typecheck
      - name: build (sem secrets — continua em warning)
        run: pnpm --filter @midrah/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_API_URL: http://localhost:3333
        continue-on-error: true

  api:
    name: api | lint + typecheck + test
    runs-on: ubuntu-latest
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @midrah/shared build
      - run: pnpm --filter @midrah/api prisma generate
      - run: pnpm --filter @midrah/api lint
      - run: pnpm --filter @midrah/api typecheck
      - run: pnpm --filter @midrah/api test
