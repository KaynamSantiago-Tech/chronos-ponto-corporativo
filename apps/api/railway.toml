[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @midrah/shared build && pnpm --filter @midrah/api exec prisma generate && pnpm --filter @midrah/api build"

[deploy]
startCommand = "pnpm --filter @midrah/api exec prisma migrate deploy && node /app/apps/api/dist/apps/api/src/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30

[env]
NODE_ENV = "production"
PORT = "3333"
